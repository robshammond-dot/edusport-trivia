<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Edusport Trivia Challenge</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#0B1829;color:#fff;min-height:100vh}
#app{min-height:100vh}
.screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.wrap{width:100%;max-width:480px}
.btn{border:none;border-radius:12px;padding:14px 20px;font-weight:700;font-size:15px;cursor:pointer;width:100%;display:block;font-family:inherit;transition:background .2s}
.btn-blue{background:#1A5BA6;color:#fff}
.btn-blue:hover{background:#1B6EC2}
.btn-blue:disabled{background:#1e293b;color:#475569;cursor:default}
.btn-gold{background:#C8961A;color:#fff}
.mode-card{background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px 22px;cursor:pointer;text-align:left;width:100%;font-family:inherit;transition:all .2s;margin-bottom:12px}
.mode-card:hover{background:rgba(26,91,166,0.18);border-color:#1A5BA6}
.input{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.14);border-radius:10px;padding:12px 14px;color:#fff;font-size:14px;outline:none;width:100%;font-family:inherit}
.input::placeholder{color:#475569}
.input:focus{border-color:#1A5BA6}
.player-row{background:rgba(255,255,255,0.06);border-radius:10px;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.avatar{background:#1A5BA6;color:#fff;border-radius:50%;width:28px;height:28px;min-width:28px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.opt{background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);border-radius:12px;padding:13px 16px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:12px;width:100%;margin-bottom:9px;font-family:inherit;transition:all .15s}
.opt:disabled{cursor:default}
.opt .ltr{background:rgba(255,255,255,0.08);border-radius:50%;width:28px;height:28px;min-width:28px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#64748B}
.opt .txt{color:#94A3B8;font-size:14px;line-height:1.4}
.opt.correct{background:rgba(34,197,94,0.15);border-color:#22C55E}
.opt.correct .txt{color:#4ADE80}
.opt.wrong{background:rgba(239,68,68,0.15);border-color:#EF4444}
.opt.wrong .txt{color:#FCA5A5}
.opt.chosen{border-color:#1A5BA6;background:rgba(26,91,166,0.15)}
.opt.chosen .txt{color:#fff}
.t-bar{height:4px;background:#1E293B}
.t-fill{height:100%;background:#22C55E;transition:width 1s linear,background .3s}
.top{background:rgba(0,0,0,0.35);padding:10px 18px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.board{background:rgba(255,255,255,0.03);border-radius:12px;padding:14px;display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-top:16px}
.award-btn{background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.12);border-radius:10px;padding:8px 16px;cursor:pointer;color:#CBD5E1;font-weight:600;font-size:14px;font-family:inherit;margin:4px;transition:all .2s}
.award-btn.done{background:rgba(34,197,94,0.15);border-color:#22C55E;color:#4ADE80;cursor:default}
.result-row{background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.08);border-radius:14px;padding:15px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.result-row.gold{background:rgba(200,150,26,0.1);border-color:#C8961A}
.stats{background:rgba(255,255,255,0.03);border-radius:10px;padding:12px 16px;display:flex;gap:20px;justify-content:center;margin-top:16px}
.stat{text-align:center}
.stat .v{color:#1A5BA6;font-weight:800;font-size:18px}
.stat .l{color:#475569;font-size:11px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const CAT={
  'Sports World':{col:'#1A5BA6',icon:'🏆'},
  'Travel Smart':{col:'#2EA527',icon:'✈️'},
  'Soft Skills': {col:'#C8961A',icon:'🤝'}
};

const ALL=[
  {c:'Sports World',q:'In which country was the 2023 Rugby World Cup hosted?',o:['Japan','Australia','France','England'],a:2},
  {c:'Sports World',q:'How many times have the Springboks won the Rugby World Cup?',o:['Two','Three','Four','Five'],a:2},
  {c:'Sports World',q:'What is the name of the trophy awarded to Rugby World Cup winners?',o:['The Bledisloe Cup','The Webb Ellis Cup','The Jules Rimet Trophy','The Calcutta Cup'],a:1},
  {c:'Sports World',q:'Wimbledon is the only Grand Slam tennis tournament played on which surface?',o:['Clay','Hard court','Grass','Synthetic'],a:2},
  {c:'Sports World',q:'The Tour de France traditionally finishes on which famous Parisian avenue?',o:['Rue de Rivoli','Avenue Montaigne','Boulevard Haussmann','Champs-Élysées'],a:3},
  {c:'Sports World',q:'Which Premier League stadium is known as "The Theatre of Dreams"?',o:['Anfield','Stamford Bridge','Old Trafford','Emirates Stadium'],a:2},
  {c:'Sports World',q:'MotoGP is the premier class of which sport?',o:['Formula One racing','Rally driving','Motorcycle road racing','Speedway'],a:2},
  {c:'Sports World',q:'Which African country hosted the 2010 FIFA World Cup?',o:['Egypt','Nigeria','Morocco','South Africa'],a:3},
  {c:'Sports World',q:'Which of these is NOT a golf Major championship?',o:['The Masters','The Open Championship','The Ryder Cup','PGA Championship'],a:2},
  {c:'Sports World',q:'The Rugby World Cup is contested every how many years?',o:['Two','Three','Four','Five'],a:2},
  {c:'Sports World',q:'At which venue is Wimbledon tennis played?',o:["Queen's Club","Flushing Meadows","All England Club","Roland Garros"],a:2},
  {c:'Sports World',q:'Which city hosts the Formula 1 Monaco Grand Prix each year?',o:['Nice','Monaco','Cannes','Marseille'],a:1},
  {c:'Travel Smart',q:'What does ISTAA stand for, of which Edusport is a proud member?',o:['International Sports Travel Agents Alliance','International Sports Travel Agencies Association','Institute of Sports Tourism and Accommodation in Africa','International Sports and Tourism Advisors Association'],a:1},
  {c:'Travel Smart',q:'Edusport has been sending South Africans to the Rugby World Cup since which year?',o:['1999','2003','2007','2011'],a:2},
  {c:'Travel Smart',q:'Why is it important to secure event tickets through official organisers?',o:['They are always the cheapest option','It guarantees authenticity and peace of mind','They can be refunded at any time','They include complimentary upgrades'],a:1},
  {c:'Travel Smart',q:'What is "incentive travel" primarily designed to achieve?',o:['Offer last-minute discounted group rates','Provide athletes with competition support','Reward and motivate staff or clients aligned with business objectives','Replace traditional conference venues'],a:2},
  {c:'Travel Smart',q:'A "tailor-made" sports travel package means it is:',o:['Always more expensive than standard packages','Pre-packaged with no changes allowed',"Customised to suit the client's unique travel requirements",'Only available to VIP clients'],a:2},
  {c:'Travel Smart',q:'How many years of experience does Edusport have in sports travel?',o:['Over 10 years','Over 20 years','Over 25 years','Over 30 years'],a:3},
  {c:'Travel Smart',q:'A VIP hospitality package at a sporting event typically adds:',o:['Guaranteed home team victory','Free airfare for the whole family','Priority boarding at all airports','Premium seating, catering and exclusive access'],a:3},
  {c:'Travel Smart',q:'When advising a first-time sports traveller, what is the most important first step?',o:['Send them a brochure immediately','Book flights to secure the best price','Recommend the most popular package','Understand their goals, budget and preferred experience'],a:3},
  {c:'Travel Smart',q:'Which best describes a "group supporter tour"?',o:['A private charter for VIP guests only','An organised trip for fans travelling together to support their team','A corporate team-building exercise','A travel package for athletes and coaches'],a:1},
  {c:'Travel Smart',q:'What are the four key components Edusport handles in a sports travel package?',o:['Flights, meals, sightseeing and tickets','Flights, accommodation, transfers and tickets','Visas, flights, meals and hotels','Accommodation, meals, transfers and insurance'],a:1},
  {c:'Soft Skills',q:"A client calls to say match tickets haven't arrived three days before travel. What is your first action?",o:['Tell them to check spam and call back','Transfer them to a manager immediately','Acknowledge their concern, apologise for the stress, and immediately investigate','Advise that tickets are always issued close to the event'],a:2},
  {c:'Soft Skills',q:'Which best describes "active listening" in a client interaction?',o:['Talking more than the client to show expertise','Giving full attention, asking clarifying questions and reflecting back','Nodding along while preparing your response','Waiting for the client to finish before responding'],a:1},
  {c:'Soft Skills',q:'A client requests a package outside your standard offering. What is the best approach?',o:['Tell them it is not possible','Refer them to a competitor','Offer the closest standard package without asking further questions','Explore whether you can customise something to meet their needs'],a:3},
  {c:'Soft Skills',q:"You discover you have made an error in a client's hotel booking. What do you do?",o:['Wait and see if they notice','Fix it quietly and say nothing','Proactively inform the client, apologise and present a solution','Blame the hotel and move on'],a:2},
  {c:'Soft Skills',q:'What is "upselling" in a travel sales context?',o:['Overcharging a client without their knowledge','Adding hidden fees to a booking','Selling unnecessary add-ons to increase revenue',"Suggesting a higher-value option that genuinely enhances the client's experience"],a:3},
  {c:'Soft Skills',q:'A client returns from a trip disappointed with one aspect. What is the ideal response?',o:['Immediately offer a discount on their next booking','Thank them for the feedback, acknowledge their experience and explore improvements','Defend the service and explain why it was acceptable','Forward the complaint to the supplier without following up'],a:1},
  {c:'Soft Skills',q:'Which is the most effective way to build long-term client relationships?',o:['Sending promotional emails as often as possible','Offering the lowest prices every time','Consistent, personalised follow-up and genuine interest in their experience','Only contacting clients when there is a new package to sell'],a:2},
  {c:'Soft Skills',q:'A client calls in a panic because their flight is cancelled on the day of travel. What tone should you use?',o:['Businesslike and procedural to show professionalism','Apologetic but unable to assist further','Calm, empathetic and solution-focused','Urgent and anxious so they feel understood'],a:2},
  {c:'Soft Skills',q:'What does "managing client expectations" mean?',o:['Promising more than you can deliver to win the sale','Clearly communicating what is included, what is not, and what clients can realistically expect','Only sharing good news with clients','Letting clients assume whatever they wish'],a:1},
  {c:'Soft Skills',q:'A colleague is struggling with a large group booking and you have capacity. What do you do?',o:['Focus on your own work; it is not your responsibility','Tell your manager your colleague is struggling','Take over the booking without informing your colleague','Offer to assist and collaborate so the client is not affected'],a:3},
];

const S={screen:'home',mode:null,players:[],nameInput:'',questions:[],qIdx:0,curP:0,scores:{},selected:null,revealed:false,awarded:[],timer:20,_iv:null};

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function pickQ(){const m={};ALL.forEach(q=>{(m[q.c]=m[q.c]||[]).push(q);});const pool=[];Object.values(m).forEach(qs=>pool.push(...shuffle(qs).slice(0,5)));return shuffle(pool);}
function stopT(){if(S._iv){clearInterval(S._iv);S._iv=null;}}
function startT(){
  stopT();S.timer=20;
  S._iv=setInterval(()=>{
    S.timer--;
    const f=document.getElementById('tf'),n=document.getElementById('tn'),r=document.getElementById('tr');
    const col=S.timer>10?'#22C55E':S.timer>5?'#F97316':'#EF4444';
    if(f){f.style.width=(S.timer/20*100)+'%';f.style.background=col;}
    if(n){n.textContent=S.timer;n.style.color=col;}
    if(r){r.style.borderColor=col;}
    if(S.timer<=0){stopT();S.revealed=true;render();}
  },1000);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function logoHTML(){
  return `<div style="text-align:center;margin-bottom:28px">
    <div style="color:#1A5BA6;font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;margin-bottom:4px">EDUSPORT</div>
    <div style="color:#2EA527;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase">TRAVEL AND TOURS</div>
  </div>`;
}

function render(){
  const app=document.getElementById('app');
  if(S.screen==='home')app.innerHTML=rHome();
  else if(S.screen==='setup')app.innerHTML=rSetup();
  else if(S.screen==='game'&&S.mode==='individual')app.innerHTML=rIndividual();
  else if(S.screen==='game'&&S.mode==='facilitated')app.innerHTML=rFacilitated();
  else if(S.screen==='results')app.innerHTML=rResults();
  if(S.screen==='game'&&S.mode==='individual'&&!S.revealed)startT();
}

function rHome(){
  const cats=Object.entries(CAT).map(([c,v])=>`<div style="text-align:center"><div style="font-size:22px">${v.icon}</div><div style="color:${v.col};font-size:11px;font-weight:700;margin-top:4px">${c}</div></div>`).join('');
  return `<div class="screen"><div class="wrap" style="text-align:center">
    ${logoHTML()}
    <div style="color:#fff;font-size:34px;font-weight:800;margin-bottom:6px">Trivia Challenge</div>
    <div style="color:#64748B;font-size:13px;margin-bottom:28px">Sports · Travel · Soft Skills</div>
    <div style="color:#94A3B8;font-size:14px;margin-bottom:20px">Select a game mode to begin</div>
    <button class="mode-card" onclick="setMode('individual')">
      <div style="font-size:28px;margin-bottom:6px">👤</div>
      <div style="color:#fff;font-weight:700;font-size:16px;margin-bottom:4px">Individual Play</div>
      <div style="color:#94A3B8;font-size:13px;line-height:1.5">Solo or take turns on a shared screen. A countdown timer keeps the pressure on.</div>
    </button>
    <button class="mode-card" onclick="setMode('facilitated')">
      <div style="font-size:28px;margin-bottom:6px">🎙️</div>
      <div style="color:#fff;font-weight:700;font-size:16px;margin-bottom:4px">Facilitated Play</div>
      <div style="color:#94A3B8;font-size:13px;line-height:1.5">A host reads questions aloud at their own pace. Reveal the answer when ready, then award points manually.</div>
    </button>
    <div style="display:flex;gap:24px;justify-content:center;margin-top:28px">${cats}</div>
  </div></div>`;
}

function rSetup(){
  const fac=S.mode==='facilitated';
  const rows=S.players.map((p,i)=>`<div class="player-row">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="avatar">${i+1}</div>
      <span style="color:#e2e8f0;font-size:14px">${esc(p)}</span>
    </div>
    <button onclick="removeP(${i})" style="background:none;border:none;color:#475569;cursor:pointer;font-size:22px;line-height:1;font-family:inherit">×</button>
  </div>`).join('');
  const dis=!S.nameInput.trim()||S.players.length>=8;
  return `<div class="screen"><div class="wrap">
    <button onclick="goHome()" style="background:none;border:none;color:#64748B;cursor:pointer;font-size:14px;margin-bottom:20px;padding:0;font-family:inherit">← Back</button>
    <div style="color:#1A5BA6;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px">${fac?'Facilitated Play':'Individual Play'}</div>
    <div style="color:#fff;font-size:26px;font-weight:800;margin-bottom:6px">Add Players</div>
    <div style="color:#475569;font-size:13px;margin-bottom:28px">${fac?'Add up to 8 players or teams. The facilitator awards points manually.':'Add 1 or more players. Solo play works too — great for self-practice with the timer.'}</div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <input class="input" id="ni" placeholder="${fac?'Player or team name…':'Player name…'}" oninput="S.nameInput=this.value" onkeydown="if(event.key==='Enter')addP()" value="${esc(S.nameInput)}" autofocus>
      <button onclick="addP()" style="background:#1A5BA6;color:#fff;border:none;border-radius:10px;padding:12px 18px;font-weight:700;font-size:14px;cursor:pointer;white-space:nowrap;font-family:inherit">Add</button>
    </div>
    <div style="min-height:50px;margin-bottom:24px">${rows}</div>
    <button class="btn btn-blue" onclick="startGame()" ${S.players.length<1?'disabled':''}>
      Start Game — ${S.players.length} ${S.players.length===1?'player':'players'}
    </button>
    <div class="stats">
      <div class="stat"><div class="v">15</div><div class="l">Questions</div></div>
      <div class="stat"><div class="v">10</div><div class="l">Pts each</div></div>
      ${!fac?'<div class="stat"><div class="v">20s</div><div class="l">Timer</div></div>':''}
      <div class="stat"><div class="v">3</div><div class="l">Categories</div></div>
    </div>
  </div></div>`;
}

function rIndividual(){
  const q=S.questions[S.qIdx],cat=CAT[q.c],pl=S.players[S.curP];
  const pct=(S.timer/20*100)+'%',tcol=S.timer>10?'#22C55E':S.timer>5?'#F97316':'#EF4444';
  const opts=q.o.map((o,i)=>{
    let cls='opt';
    if(S.revealed){if(i===q.a)cls+=' correct';else if(i===S.selected)cls+=' wrong';}
    else if(S.selected===i)cls+=' chosen';
    return `<button class="${cls}" onclick="answer(${i})" ${S.revealed?'disabled':''}><span class="ltr">${String.fromCharCode(65+i)}</span><span class="txt">${esc(o)}</span></button>`;
  }).join('');
  const fb=S.revealed?`<div style="text-align:center;margin-bottom:14px">
    ${S.selected===q.a?'<div style="color:#4ADE80;font-weight:700;font-size:17px">Correct! +10 pts 🎉</div>':`<div style="color:#F87171;font-weight:700;font-size:17px">${S.selected===null?"Time's up!":"Not quite!"} Correct answer: <span style="color:#4ADE80">${esc(q.o[q.a])}</span></div>`}
  </div><button class="btn btn-blue" onclick="nextQ()">${S.qIdx+1<S.questions.length?'Next →':'See Results →'}</button>`:'';
  return `<div style="min-height:100vh;background:#0B1829;display:flex;flex-direction:column;font-family:inherit">
    <div class="top">
      <div><div style="color:${cat.col};font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase">${cat.icon} ${q.c}</div><div style="color:#475569;font-size:12px">Q${S.qIdx+1} of ${S.questions.length}</div></div>
      <div style="text-align:right"><div style="color:#fff;font-size:13px;font-weight:700">${esc(pl)}'s turn</div><div style="color:#475569;font-size:12px">${S.scores[pl]} pts</div></div>
    </div>
    <div class="t-bar"><div class="t-fill" id="tf" style="width:${pct};background:${tcol}"></div></div>
    <div style="flex:1;padding:20px 18px;max-width:600px;width:100%;margin:0 auto">
      <div id="tr" style="width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;border:2px solid ${tcol}">
        <span id="tn" style="color:${tcol};font-weight:800;font-size:20px">${S.timer}</span>
      </div>
      <div style="background:rgba(255,255,255,0.05);border-radius:16px;padding:22px 20px;margin-bottom:16px;border:1px solid ${cat.col}30;text-align:center">
        <p style="color:#fff;font-size:17px;font-weight:600;margin:0;line-height:1.55">${esc(q.q)}</p>
      </div>
      ${opts}${fb}
    </div>
  </div>`;
}

function rFacilitated(){
  const q=S.questions[S.qIdx],cat=CAT[q.c];
  const opts=q.o.map((o,i)=>{const ok=S.revealed&&i===q.a;return `<div style="background:${ok?'rgba(34,197,94,0.14)':'rgba(255,255,255,0.05)'};border:2px solid ${ok?'#22C55E':'rgba(255,255,255,0.09)'};border-radius:12px;padding:13px 15px;display:flex;gap:10px;align-items:flex-start">
    <span style="background:rgba(255,255,255,0.08);border-radius:50%;width:26px;height:26px;min-width:26px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#64748B">${String.fromCharCode(65+i)}</span>
    <span style="color:${ok?'#4ADE80':'#94A3B8'};font-size:14px;line-height:1.4">${esc(o)}</span>
  </div>`;}).join('');
  const awards=S.players.map((p,i)=>{const done=S.awarded.includes(i);return `<button class="award-btn${done?' done':''}" onclick="${done?'':'awardP('+i+')'}">${done?'✓ ':''}${esc(p)}</button>`;}).join('');
  const sorted=[...S.players.map((p,i)=>({p,i}))].sort((a,b)=>S.scores[b.p]-S.scores[a.p]);
  const board=sorted.map(({p},r)=>`<div style="text-align:center"><div style="font-size:16px">${['🥇','🥈','🥉'][r]||'🎖️'}</div><div style="color:#e2e8f0;font-size:13px;font-weight:700">${esc(p)}</div><div style="color:#1A5BA6;font-size:13px">${S.scores[p]} pts</div></div>`).join('');
  const ctrl=!S.revealed?`<button class="btn btn-gold" onclick="reveal()">Reveal Answer</button>`:`<div>
    <div style="color:#4ADE80;text-align:center;font-weight:700;font-size:15px;margin-bottom:14px">✓ Correct: ${esc(q.o[q.a])}</div>
    <div style="color:#64748B;font-size:13px;text-align:center;margin-bottom:10px">Award points to correct players:</div>
    <div style="text-align:center;margin-bottom:16px">${awards}</div>
    <button class="btn btn-blue" onclick="nextQ()">${S.qIdx+1<S.questions.length?'Next Question →':'See Results →'}</button>
  </div>`;
  return `<div style="min-height:100vh;background:#0B1829;display:flex;flex-direction:column;font-family:inherit">
    <div class="top">
      <div><div style="color:${cat.col};font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase">${cat.icon} ${q.c}</div><div style="color:#475569;font-size:12px">Q${S.qIdx+1} of ${S.questions.length}</div></div>
      <div style="background:rgba(200,150,26,0.12);border:1px solid #C8961A;border-radius:8px;padding:4px 10px"><span style="color:#C8961A;font-size:11px;font-weight:700">🎙️ FACILITATED</span></div>
    </div>
    <div style="flex:1;padding:20px 18px;max-width:700px;width:100%;margin:0 auto">
      <div style="background:rgba(255,255,255,0.05);border-radius:16px;padding:26px 22px;margin-bottom:16px;border:1px solid ${cat.col}45;text-align:center">
        <p style="color:#fff;font-size:19px;font-weight:600;margin:0;line-height:1.55">${esc(q.q)}</p>
      </div>
      <div class="grid2">${opts}</div>
      ${ctrl}
      <div class="board">${board}</div>
    </div>
  </div>`;
}

function rResults(){
  const sorted=Object.entries(S.scores).sort((a,b)=>b[1]-a[1]);
  const rows=sorted.map(([n,s],i)=>`<div class="result-row ${i===0?'gold':''}">
    <div style="display:flex;align-items:center;gap:12px">
      <span style="font-size:26px">${['🥇','🥈','🥉'][i]||'🎖️'}</span>
      <div><div style="color:#fff;font-weight:700;font-size:15px">${esc(n)}</div><div style="color:#475569;font-size:12px">Place ${i+1}</div></div>
    </div>
    <div style="text-align:right"><div style="color:${i===0?'#C8961A':'#1A5BA6'};font-weight:800;font-size:22px">${s}</div><div style="color:#475569;font-size:12px">pts</div></div>
  </div>`).join('');
  return `<div class="screen"><div class="wrap" style="text-align:center">
    ${logoHTML()}
    <div style="color:#1A5BA6;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px">Game Over</div>
    <div style="color:#fff;font-size:28px;font-weight:800;margin-bottom:6px">Final Scores</div>
    <div style="color:#475569;font-size:13px;margin-bottom:28px">Well played, everyone!</div>
    <div style="margin-bottom:24px;text-align:left">${rows}</div>
    <button class="btn btn-blue" onclick="reset()">Play Again</button>
    <div style="margin-top:28px;color:#1a2e4a;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase">Edusport Travel and Tours</div>
  </div></div>`;
}

function setMode(m){S.mode=m;S.screen='setup';render();}
function goHome(){stopT();S.screen='home';render();}
function addP(){const n=S.nameInput.trim();if(!n||S.players.includes(n)||S.players.length>=8)return;S.players.push(n);S.nameInput='';render();}
function removeP(i){S.players.splice(i,1);render();}
function startGame(){if(!S.players.length)return;S.questions=pickQ();S.scores={};S.players.forEach(p=>S.scores[p]=0);S.qIdx=0;S.curP=0;S.selected=null;S.revealed=false;S.awarded=[];S.timer=20;S.screen='game';render();}
function answer(i){if(S.revealed)return;stopT();S.selected=i;S.revealed=true;if(i===S.questions[S.qIdx].a)S.scores[S.players[S.curP]]+=10;render();}
function nextQ(){stopT();if(S.qIdx+1>=S.questions.length){S.screen='results';render();return;}S.qIdx++;if(S.mode==='individual')S.curP=(S.curP+1)%S.players.length;S.selected=null;S.revealed=false;S.awarded=[];S.timer=20;render();}
function reveal(){S.revealed=true;render();}
function awardP(i){if(S.awarded.includes(i))return;S.awarded.push(i);S.scores[S.players[i]]+=10;render();}
function reset(){stopT();Object.assign(S,{screen:'home',mode:null,players:[],nameInput:'',questions:[],qIdx:0,curP:0,scores:{},selected:null,revealed:false,awarded:[],timer:20,_iv:null});render();}

render();
</script>
</body>
</html>
